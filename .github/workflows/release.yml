name: release

# Push a version tag to cut a release:
#   git tag v0.3.0 && git push origin v0.3.0
# GoReleaser then builds all binaries, creates the GitHub release with
# checksums, and updates the Homebrew tap (certcutover/homebrew-tap) automatically.
#
# One-time setup: the tap update needs write access to a *different* repo than
# the default GITHUB_TOKEN can reach. Create a fine-grained PAT scoped to the
# `homebrew-tap` repo with Contents: Read and write, then add it to THIS repo
# (certcutover/as2inspect) as the secret HOMEBREW_TAP_TOKEN.
on:
  push:
    tags:
      # Full semver only (v1.2.3). The floating v1/v2 tags are GitHub Action
      # pointers, not CLI releases — they must NOT trigger GoReleaser.
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # create the GitHub release on this repo

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Default token creates the release on THIS repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with push access to the tap repo (Contents: write).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
