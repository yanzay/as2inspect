name: release

# Push a version tag to cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
# GoReleaser then builds all binaries, creates the GitHub release with
# checksums, and updates the Homebrew tap (yanzay/homebrew-tap) automatically.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history + tags

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Default token creates the release on THIS repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with push access to the tap repo, for the Homebrew cask commit.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
